<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>d1z — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#09090f;--surface:#13131f;--border:rgba(255,255,255,.08);--accent:#5865f2;--text:#f0f0ff;--text2:#9999bb}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(88,101,242,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(88,101,242,.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none}
.orb1{width:500px;height:500px;background:rgba(88,101,242,.1);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:rgba(114,137,255,.08);bottom:-100px;right:-100px}
.card{
  position:relative;z-index:1;
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;padding:3rem;width:100%;max-width:420px;
  text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,.4);
}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:2.5rem;background:linear-gradient(135deg,#fff,#7289ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
h2{font-family:'Syne',sans-serif;font-weight:700;font-size:1.3rem;margin-bottom:.5rem}
p{color:var(--text2);font-size:.9rem;line-height:1.6;margin-bottom:2rem}
.discord-btn{
  display:inline-flex;align-items:center;gap:.75rem;
  background:#5865f2;color:#fff;text-decoration:none;
  padding:.9rem 2rem;border-radius:10px;font-weight:600;font-size:.97rem;
  transition:all .25s;width:100%;justify-content:center;
}
.discord-btn:hover{background:#4752c4;transform:translateY(-2px);box-shadow:0 8px 24px rgba(88,101,242,.4)}
.discord-btn svg{width:22px;height:22px;fill:currentColor}
.error{background:rgba(240,71,71,.1);border:1px solid rgba(240,71,71,.25);border-radius:8px;padding:.75rem 1rem;color:#f04747;font-size:.85rem;margin-bottom:1rem}
.back{display:block;margin-top:1.5rem;color:var(--text2);font-size:.82rem;text-decoration:none;transition:color .2s}
.back:hover{color:var(--text)}
</style>
</head>
<body>
<div class="grid-bg"></div><div class="orb orb1"></div><div class="orb orb2"></div>
<div class="card">
  <div class="logo">d1z</div>
  <h2>Sign in to Dashboard</h2>
  <p>Connect your Discord account to manage your servers with d1z.</p>
  <div id="errBox" style="display:none" class="error">⚠️ Authentication failed. Please try again.</div>
  <a href="/auth/login" class="discord-btn">
    <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.015.043.033.054a19.94 19.94 0 0 0 6.011 3.04.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.04.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Continue with Discord
  </a>
  <a href="/" class="back">← Back to home</a>
</div>
<script>if(location.search.includes('error'))document.getElementById('errBox').style.display='block'</script>
</body>
</html>
